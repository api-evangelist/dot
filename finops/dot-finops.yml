meters:
  - name: api_requests
    description: Total API requests made to FMCSA or NHTSA endpoints.
    unit: requests
    aggregation: count
    dimensions: [api_surface, endpoint, date]
  - name: data_records_returned
    description: Count of records/carriers returned by FMCSA queries.
    unit: records
    aggregation: sum
    dimensions: [api_surface, endpoint, date]
principles:
  - name: Visibility
    description: >-
      Track API request volumes and error rates per endpoint using application
      logs or API gateway metrics. Monitor FMCSA webkey usage to detect
      anomalies or unauthorized use.
  - name: Allocation
    description: >-
      Assign separate FMCSA webkeys per application or team to attribute usage
      and enable key rotation without disrupting all consumers.
  - name: Optimization
    description: >-
      Cache FMCSA carrier data locally where permitted to reduce redundant
      API calls. Use NHTSA vPIC batch decode (up to 50 VINs per request)
      to minimize request count. Prefer bulk downloads from data.transportation.gov
      for large data extracts over repeated live API calls.
  - name: Accountability
    description: >-
      Monitor transportation.gov/status and FMCSA developer portal announcements
      for planned maintenance or service disruptions. Implement graceful
      degradation in applications that depend on DOT APIs, as availability
      is subject to federal appropriations and agency IT operations.
  - name: AvailabilityRisk
    description: >-
      The primary FinOps risk for DOT APIs is availability, not spend. Build
      retry logic, local caching, and fallback data sources to handle government
      shutdown scenarios or unplanned outages.
