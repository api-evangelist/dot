specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: US Department of Transportation
providerId: dot
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - Government
  - Transportation
  - FinOps
  - FOCUS
  - Free
description: >-
  FOCUS-aligned FinOps profile for the U.S. Department of Transportation public
  API portfolio. All DOT agency APIs (FMCSA QCMobile, FMCSA SaferBus, NHTSA
  vPIC, and the DOT Open Data Portal) are free public government services with
  no direct monetary charges to API consumers. Cost exposure is limited to
  internal engineering time, infrastructure for key management, and any
  third-party integrations built on top of the data.
notes: >-
  DOT APIs are federally funded. There is no metered billing, no overage fees,
  and no subscription cost. Operational risk is availability risk (government
  shutdown, appropriations lapse, or agency IT outages) rather than spend risk.
sources:
  - https://mobile.fmcsa.dot.gov/QCDevsite/docs/apiAccess
  - https://vpic.nhtsa.dot.gov/api/
  - https://www.transportation.gov/developer
