created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - Government
  - Transportation
  - Free
  - Public APIs
description: >-
  All public DOT agency APIs (FMCSA QCMobile, FMCSA SaferBus, NHTSA vPIC, and
  the DOT Open Data Portal) are free public government services funded by
  federal appropriations. There is no commercial pricing tier. FMCSA APIs
  require a free developer account and API webkey obtained through Login.gov.
  NHTSA vPIC requires no authentication. The DOT Open Data Portal is publicly
  accessible. No rate limit fees, overages, or usage-based charges apply.
notes: >-
  DOT API availability and funding are subject to congressional appropriations
  and agency operational status. During government shutdowns or lapses in
  appropriations, services may be unavailable.
sources:
